<!DOCTYPE html>
<html style="
  display: flex;
  flex-direction: row;
  justify-content: center;">
  <head>
    <title>Vault of Secrets Simulator</title>
    <link rel="icon" href="favicon.ico">
    <link rel="stylesheet" href="css/stylesheet.css">
    <script src="js/script.js" defer></script>
    <script src="js/libraries/pako.min.js"></script>
  </head>
  <body onload="playAudio()">
    
    <img src="images/logo.png" style="transform: scale(0.5); margin-top: 5px; -webkit-user-drag: none;" alt="Vault of Secrets" title="Logo">
    
    <noscript>
      <p style="text-align: center;">This page requires JavaScript to work. Please enable JavaScript in your browser settings.</p>
    </noscript>
    
    <a href="../">
      <img src="images/backBtn.png" style="
        position: absolute;
        left: -18px;
        top: -30px;
        transform: scale(0.46);
        -webkit-user-drag: none;
        " alt="Back Button" title="Back">
    </a>
    
    <img src="images/optionsBtn.png" style="
      position: absolute;
      left: -50px;
      bottom: -51px;
      transform: scale(0.4);
      -webkit-user-drag: none;
      cursor: pointer;
      " alt="Options Button" title="Options" onclick="optMenu()">
    
    <img src="images/achBtn.png" style="
      position: absolute;
      left: 38px;
      bottom: -52px;
      transform: scale(0.4);
      -webkit-user-drag: none;
      cursor: pointer;
      " alt="Achievements Button" title="Achievements" onclick="achMenu()">
    
    <p id="keymasterResponse" style="text-align: center; margin-top: 20px;">
      <img src="images/loading.png" style="-webkit-user-drag: none;" id="loading" alt="Loading Icon" title="Loading">
    </p>
    
    <input id="userInput" placeholder="..." style="
      margin-left: 29.5%;
      margin-top: -10px;
      text-align: center;
      width: 350px;
      height: 70px;
      " autocomplete="off">
    
    <img src="images/keymaster.png" style="
      position: relative;
      left: 35%;
      margin-top: -55px;
      transform: scale(0.5);
      -webkit-user-drag: none;
      cursor: pointer;
      " id="keymaster" alt="Keymaster" title="The Keymaster" onclick="nextMessage(document.getElementById('userInput').value)">

    <img src="images/basementDoor.png" id="basementDoor" style="
      position: absolute;
      right: -24px;
      bottom: -58px;
      transform: scale(0.5);
      -webkit-user-drag: none;
      cursor: pointer;
      " alt="Basement Door" title="Basement" onclick="basementMessage()">
    
    <div id="menus">
      <div class="brownbox" id="optMenu" style="
        position: absolute;
        left: 50%;
        top: 50%;
        width: 50%;
        height: 80%;
        display: none;
        transform: translate(-50%, -50%);
        ">
        <img src="images/closeBtn.png" style="
          position: absolute;
          left: -100px;
          top: -100px;
          transform: scale(0.46);
          -webkit-user-drag: none;
          cursor: pointer;
          " alt="Close Button" title="Close Menu" onclick="document.getElementById('optMenu').style.display = 'none'">

        <input id="userNameInput" style="height: 60px;" placeholder="Username" maxlength="15">
        <button style="width: 40%; height: 62px; transform: translateY(-80px);" onclick="saveSettings()">Save</button>
        <input type="checkbox" id="audioCheck">
        <button style="width: 90%; height: 62px;" onclick="localStorage.removeItem('vosCached'); window.location.reload();">Clear Cache and Reload</button>
      </div>
      <div class="brownbox" id="achMenu" style="
        position: absolute;
        left: 50%;
        top: 50%;
        width: 50%;
        height: 80%;
        display: none;
        transform: translate(-50%, -50%);
        text-align: center;
        ">
        <img src="images/closeBtn.png" style="
          position: absolute;
          left: -100px;
          top: -100px;
          transform: scale(0.46);
          -webkit-user-drag: none;
          cursor: pointer;
          " alt="Close Button" title="Close Menu" onclick="document.getElementById('achMenu').style.display = 'none'">
    </div>
  </body>
</html>
