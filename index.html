<!DOCTYPE html>
<html style="
  display: flex;
  flex-direction: row;
  justify-content: center;">
  <head>
    <title>Vault of Secrets Simulator</title>
    <link rel="icon" href="favicon.ico">
    <link rel="stylesheet" href="css/stylesheet.css">
    <script src="js/script.js"></script>
  </head>
  <body onload="playAudio()">
    
    <img src="images/logo.png" style="transform: scale(0.5); margin-top: 5px;" alt="Vault of Secrets" title="Logo">
    
    <a href="../">
      <img src="../gdeditor/assets/GJ_arrow_01_001.png" style="
        position: absolute;
        left: -18px;
        top: -30px;
        transform: scale(0.46);
        " alt="Back Button" title="Back">
    </a>
    
    <img src="images/optionsBtn.png" style="
      position: absolute;
      left: -50px;
      bottom: -51px;
      transform: scale(0.4);
      cursor: pointer;
      " alt="Options Button" title="Options" onclick="optMenu()">
    
    <img src="images/achBtn.png" style="
      position: absolute;
      left: 38px;
      bottom: -52px;
      transform: scale(0.4);
      cursor: pointer;
      " alt="Achievements Button" title="Achievements" onclick="achMenu()">
    
    <p id="keymasterResponse" style="text-align: center; margin-top: 20px;">Loading</p>
    <input id="userInput" placeholder="..." style="
      margin-left: 29.5%;
      margin-top: -10px;
      text-align: center;
      width: 350px;
      height: 70px;
      ">
    
    <img src="images/keymaster.png" style="
      position: relative;
      left: 35%;
      margin-top: -55px;
      transform: scale(0.5);
      cursor: pointer;
      " id="keymaster" alt="Keymaster" title="The Keymaster" onclick="nextMessage(document.getElementById('userInput').value)">
    
  </body>
</html>
